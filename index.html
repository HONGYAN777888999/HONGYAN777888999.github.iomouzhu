<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>莱文特档案 - 秘仪图书馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0c12 0%, #030507 100%);
            font-family: 'Segoe UI', 'Cormorant Garamond', 'Inter', system-ui, 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e5e9f0;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            min-height: 650px;
            background: rgba(12, 14, 22, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(210, 180, 140, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(210, 180, 140, 0.1) inset;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeScaleUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeScaleUp {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .panel {
            padding: 1.8rem 2rem 2.2rem;
            transition: opacity 0.3s ease;
        }

        .hidden-panel {
            display: none !important;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(210, 180, 140, 0.3);
        }
        .back-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #cbbf91;
            font-size: 1rem;
            transition: all 0.2s;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            border: 1px solid transparent;
        }
        .back-nav:hover {
            background: rgba(200, 180, 120, 0.1);
            border-color: rgba(200, 180, 120, 0.3);
            color: #f3e7c9;
        }
        .back-nav span {
            font-size: 1.3rem;
        }
        .nav-title {
            margin-left: auto;
            font-size: 0.85rem;
            color: #b9ad8a;
            letter-spacing: 2px;
        }
        .home-nav {
            margin-left: 1rem;
            cursor: pointer;
            color: #b9ad8a;
            transition: color 0.2s;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
        }
        .home-nav:hover {
            color: #f3e7c9;
            background: rgba(200, 180, 120, 0.08);
        }

        .arcane-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }
        .arcane-header h1 {
            font-size: 2.6rem;
            letter-spacing: 4px;
            font-weight: 500;
            background: linear-gradient(135deg, #f3e7c9, #cbbf91);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-family: 'Playfair Display', 'Times New Roman', serif;
        }
        .arcane-header .sub {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #b9ad8a;
            border-top: 1px dashed rgba(200, 180, 120, 0.4);
            display: inline-block;
            padding-top: 8px;
            margin-top: 8px;
        }

        .glass-card {
            background: rgba(20, 22, 32, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            border: 1px solid rgba(210, 180, 140, 0.35);
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .input-group {
            margin-bottom: 1.8rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cfc8b0;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            background: #0e0f17;
            border: 1px solid #2e2c3a;
            padding: 0.9rem 1.2rem;
            border-radius: 2rem;
            font-size: 1rem;
            color: #f0ecd8;
            transition: all 0.25s;
            outline: none;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .input-group input:focus {
            border-color: #c7b26b;
            box-shadow: 0 0 10px rgba(199, 178, 107, 0.3);
            background: #0b0c14;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: center;
        }
        .btn {
            background: rgba(30, 33, 48, 0.9);
            border: 1px solid #5f5742;
            padding: 0.75rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            color: #f2e8cf;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            flex: 1;
            text-align: center;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: #2c2416;
            border-color: #b89a5a;
            color: #ffefcf;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        .btn-primary:hover {
            background: #4a3a24;
            border-color: #e7c27d;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #1a1c26b3;
            border-color: #5d553f;
        }
        .btn-secondary:hover {
            background: #2d2e3f;
            border-color: #b19f6b;
            transform: translateY(-2px);
        }

        .detect-status {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #c2b280;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(194, 178, 128, 0.3);
            border-top: 2px solid #e7c885;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 图书馆主页 */
        .library-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .welcome-area {
            background: linear-gradient(145deg, #11141f, #080b10);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            border-left: 5px solid #cbb165;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .welcome-area h2 {
            font-size: 1.6rem;
            font-weight: 500;
        }
        .permission-badge {
            display: inline-block;
            background: #1f1d2e;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #b6934b;
            margin-top: 0.5rem;
        }

        /* 档案网格 */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }
        @media (max-width: 700px) {
            .archive-grid {
                grid-template-columns: 1fr;
            }
        }

        .archive-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid #4a4230;
            backdrop-filter: blur(3px);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .archive-card:hover {
            border-color: #cbb165;
            box-shadow: 0 0 25px rgba(203, 177, 101, 0.2);
            transform: translateY(-3px);
            background: rgba(20, 22, 40, 0.6);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px dashed #6a5e42;
            padding-bottom: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .card-icon {
            font-size: 1.5rem;
        }
        .card-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e7cf9e;
        }
        .card-alias {
            font-size: 0.7rem;
            color: #b9ad8a;
            margin-left: auto;
        }
        .card-preview {
            font-size: 0.8rem;
            color: #c2b280;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* 档案详情页面 */
        .archive-detail-page {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            border: 1px solid #ab8e4c;
            border-radius: 1.8rem;
            padding: 1.8rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            max-height: 70vh;
            overflow-y: auto;
        }
        .archive-detail-page::-webkit-scrollbar {
            width: 6px;
        }
        .archive-detail-page::-webkit-scrollbar-thumb {
            background: #6a5e42;
            border-radius: 10px;
        }

        .profile-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            border-bottom: 2px solid #b89a5a;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .profile-name {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(145deg, #f5e2b9, #c4a56e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .profile-alias {
            color: #c9bc93;
            font-style: italic;
            font-size: 0.95rem;
            margin-left: auto;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem 1.5rem;
        }
        @media (max-width: 700px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-section {
            background: rgba(10, 12, 20, 0.6);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid #4f4630;
        }
        .section-title {
            font-size: 1.1rem;
            color: #e2cf9a;
            border-left: 4px solid #cfb15b;
            padding-left: 10px;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .power-tier {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f3d27e;
            text-shadow: 0 0 8px #ab7e1f;
        }

        .ability-list {
            list-style: none;
        }
        .ability-list li {
            margin-bottom: 0.6rem;
            border-bottom: 1px dotted #5a4f38;
            padding-bottom: 0.3rem;
            font-size: 0.85rem;
        }

        .weakness-note {
            background: #15171f;
            padding: 0.8rem;
            border-radius: 0.8rem;
            border-left: 4px solid #8a7a4c;
        }

        .secret-highlight {
            background: #05070c;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid #cbaf68;
            display: inline-block;
            font-size: 0.75rem;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .tag {
            background: #1a1c2a;
            border: 1px solid #5f5742;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: #d4c5a0;
        }

        .reenter-btn {
            margin-top: 1.5rem;
            text-align: right;
        }
        .btn-small {
            background: none;
            border: 1px solid #5f5a48;
            padding: 0.5rem 1.4rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #cdc09c;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-small:hover {
            background: #2c2a38;
            color: #ffe6b3;
        }

        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .custom-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #12141e;
            border: 1px solid #dbbc6c;
            border-radius: 2rem;
            max-width: 380px;
            width: 85%;
            padding: 1.8rem;
            text-align: center;
            box-shadow: 0 20px 35px black;
        }
        .modal-card p {
            font-size: 1.2rem;
            margin: 1rem 0;
            color: #f2e3bc;
        }
        .modal-card button {
            background: #3f3522;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            border: 1px solid #b89b57;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.2rem;
            opacity: 0.6;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: #b9ad8a;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
<div class="app-container"
