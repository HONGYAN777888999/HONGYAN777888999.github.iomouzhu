<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>欢迎来到我的主页</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(120deg, #89f7fe 0%, #66a6ff 100%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0;}
      to { opacity: 1;}
    }
    h1 {
      color: #222;
      font-size: 3rem;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.2em;
      animation: titlePop 0.8s cubic-bezier(.17,.67,.83,.67);
    }
    @keyframes titlePop {
      0% { transform: scale(0.8);}
      50% { transform: scale(1.08);}
      100% { transform: scale(1);}
    }
    p {
      color: #555;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 44px;
      line-height: 1.4;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 8px #a0c4ff;
      animation: fadeIn 2s;
    }
    .main-btn {
      display: inline-block;
      padding: 15px 40px;
      border-radius: 28px;
      background: linear-gradient(90deg,#61dafb,#2ecc71);
      color: white;
      font-size: 1.3rem;
      border: none;
      transition: transform 0.2s, box-shadow .2s;
      cursor: pointer;
      box-shadow: 0 0 0px transparent;
      margin: 0 auto;
      font-family: '微软雅黑', 'Roboto', sans-serif;
      animation: btnPopUp 1.7s cubic-bezier(.23,1.61,.32,1) 0.7s;
      animation-fill-mode: backwards;
    }
    .main-btn:hover {
      transform: scale(1.13) rotate(-2deg);
      box-shadow: 0 6px 20px #38ef7d90;
      background: linear-gradient(90deg, #2ecc71, #61dafb);
    }
    @keyframes btnPopUp {
      from { opacity: 0; transform: translateY(80px);}
      to   { opacity: 1; transform: translateY(0);}
    }
    footer {
      margin-top: auto;
      width: 100%;
      text-align: center;
      font-size: 1rem;
      color: #444;
      background: rgba(255,255,255,0.7);
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>欢迎来到我的主页</h1>
  <p>你好！我是某某（请替换为你的名字），这是我的个人主页。你可以在这里了解我的项目和联系方式。</p>
  <a href="mailto:youremail@example.com" class="main-btn">联系我</a>
  <footer>© 2026 某某的主页</footer>
</body>
</html>
